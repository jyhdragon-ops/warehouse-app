<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <!-- Box body -->
  <rect x="96" y="240" width="320" height="200" rx="20" fill="#1E3A5F" stroke="#38BDF8" stroke-width="8"/>
  <!-- Box top flaps -->
  <path d="M96 240 L160 192 L352 192 L416 240" fill="#1E3A5F" stroke="#38BDF8" stroke-width="8" stroke-linejoin="round"/>
  <!-- Center line on box -->
  <line x1="256" y1="192" x2="256" y2="240" stroke="#38BDF8" stroke-width="8"/>
  <!-- Down arrow (입고 = incoming) -->
  <line x1="256" y1="48" x2="256" y2="148" stroke="#38BDF8" stroke-width="16" stroke-linecap="round"/>
  <polyline points="196,108 256,164 316,108" fill="none" stroke="#38BDF8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text 입고 -->
  <text x="256" y="392" font-family="sans-serif" font-size="58" font-weight="bold" fill="#38BDF8" text-anchor="middle">입고</text>
</svg>
