<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0F172A"/>
  <!-- Box body -->
  <rect x="36" y="90" width="120" height="76" rx="8" fill="#1E3A5F" stroke="#38BDF8" stroke-width="3"/>
  <!-- Box top flaps -->
  <path d="M36 90 L60 72 L132 72 L156 90" fill="#1E3A5F" stroke="#38BDF8" stroke-width="3" stroke-linejoin="round"/>
  <!-- Center line on box -->
  <line x1="96" y1="72" x2="96" y2="90" stroke="#38BDF8" stroke-width="3"/>
  <!-- Down arrow (입고 = incoming) -->
  <line x1="96" y1="18" x2="96" y2="56" stroke="#38BDF8" stroke-width="6" stroke-linecap="round"/>
  <polyline points="74,40 96,62 118,40" fill="none" stroke="#38BDF8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text 입고 -->
  <text x="96" y="148" font-family="sans-serif" font-size="22" font-weight="bold" fill="#38BDF8" text-anchor="middle">입고</text>
</svg>
